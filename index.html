<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Task Card - Stage 1a</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <article class="todo-card" data-testid="test-todo-card" role="region">
    
    <div id="display-container">
      <h2 class="todo-title" data-testid="test-todo-title"></h2>

      <div id="collapsible-wrapper">
        <p class="todo-description" data-testid="test-todo-description"></p>
        <button id="expand-btn" class="text-btn" data-testid="test-todo-expand-toggle" aria-expanded="false">Read More</button>
      </div>

      <div class="badges">
        <span class="priority-badge" data-testid="test-todo-priority"></span>
        <span class="status-badge" data-testid="test-todo-status"></span>
      </div>

      <time class="due-date" data-testid="test-todo-due-date"></time>

      <div class="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite"></div>

      <div class="checkbox-wrapper">
        <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle">
        <label for="complete-toggle" class="checkbox-label">Mark as completed</label>
      </div>

      <div class="actions">
        <button class="edit-btn" data-testid="test-todo-edit-button">Edit</button>
        <button class="delete-btn" data-testid="test-todo-delete-button">Delete</button>
      </div>
    </div>

    <form id="edit-form" class="hidden" data-testid="test-todo-edit-form">
      <div class="form-group">
        <label for="edit-title">Title</label>
        <input type="text" id="edit-title" data-testid="test-todo-edit-title-input" required>
      </div>

      <div class="form-group">
        <label for="edit-desc">Description</label>
        <textarea id="edit-desc" data-testid="test-todo-edit-description-input" rows="3"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="edit-priority">Priority</label>
          <select id="edit-priority" data-testid="test-todo-edit-priority-select">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>

        <div class="form-group">
          <label for="edit-status">Status</label>
          <select id="edit-status" data-testid="test-todo-status-control">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="edit-date">Due Date</label>
        <input type="datetime-local" id="edit-date" data-testid="test-todo-edit-due-date-input">
      </div>

      <div class="actions">
        <button type="submit" class="save-btn" data-testid="test-todo-save-button">Save Changes</button>
        <button type="button" id="cancel-btn" class="cancel-btn" data-testid="test-todo-cancel-button">Cancel</button>
      </div>
    </form>

  </article>

  <script src="script.js"></script>
</body>
</html>
